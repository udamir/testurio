syntax = "proto3";
package chat.v1;

// Simple streaming without oneof — single message type per direction

service ChatService {
  rpc Chat (stream ChatMessage) returns (stream ChatEvent);
}

message ChatMessage {
  string text = 1;
  string channel = 2;
}

message ChatEvent {
  string text = 1;
  string sender = 2;
  int64 timestamp = 3;
}

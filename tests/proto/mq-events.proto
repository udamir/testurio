syntax = "proto3";

package testurio.mq;

message OrderEvent {
  string order_id = 1;
  int32  amount   = 2;
  string status   = 3;
}

message UserEvent {
  string user_id = 1;
  string action  = 2;
}

// Envelope used by the Redis Pub/Sub adapter, which wraps every published
// payload with key + headers + timestamp metadata. Binary codecs running
// over Redis must encode this whole envelope (with the inner protobuf
// payload as raw bytes in the `payload` field).
message RedisEnvelope {
  bytes  payload    = 1;
  string key        = 2;
  map<string, string> headers = 3;
  int64  timestamp  = 4;
}
